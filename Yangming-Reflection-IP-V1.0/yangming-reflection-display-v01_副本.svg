<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">阳明照心体 V0.1 字标预览</title>
  <desc id="desc">阳明心学交易系统的品牌显示字样张，包含原创照字标、首页标题和四句品牌心法。</desc>
  <defs>
    <style>
      @font-face {
        font-family: "YangmingDisplayPreview";
        src: url("../../web-next/public/fonts/NotoSerifSC-Variable.woff2") format("woff2");
        font-weight: 200 900;
      }
      @font-face {
        font-family: "YangmingHandPreview";
        src: url("../../web-next/public/fonts/LXGWWenKai-Medium.woff2") format("woff2");
        font-weight: 500;
      }
      .label {
        font-family: "YangmingDisplayPreview", "Noto Serif SC", "Songti SC", serif;
        font-size: 24px;
        font-weight: 430;
        letter-spacing: .22em;
        fill: rgba(216, 183, 111, .68);
      }
      .small {
        font-family: "Noto Sans SC", "PingFang SC", sans-serif;
        font-size: 18px;
        font-weight: 500;
        letter-spacing: .12em;
        fill: rgba(244, 235, 221, .46);
      }
      .display {
        font-family: "YangmingDisplayPreview", "Noto Serif SC", "Songti SC", serif;
        font-weight: 470;
        letter-spacing: .055em;
        fill: url(#creamGold);
      }
      .mantra {
        font-family: "YangmingDisplayPreview", "Noto Serif SC", "Songti SC", serif;
        font-size: 37px;
        font-weight: 430;
        letter-spacing: .12em;
        fill: rgba(244, 235, 221, .76);
      }
      .latin {
        font-family: "Avenir Next", "Inter", "Helvetica Neue", Arial, sans-serif;
        font-size: 16px;
        font-weight: 600;
        letter-spacing: .26em;
        fill: rgba(244, 235, 221, .34);
      }
    </style>
    <radialGradient id="bgGlow" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#1a1711"/>
      <stop offset="46%" stop-color="#0f0f0c"/>
      <stop offset="100%" stop-color="#080807"/>
    </radialGradient>
    <linearGradient id="creamGold" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff9eb"/>
      <stop offset="48%" stop-color="#f4ebdd"/>
      <stop offset="100%" stop-color="#d8b76f"/>
    </linearGradient>
    <linearGradient id="strokeGold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4ebdd"/>
      <stop offset="46%" stop-color="#d8b76f"/>
      <stop offset="100%" stop-color="#8f7440"/>
    </linearGradient>
    <linearGradient id="quietLine" x1="0" x2="1">
      <stop offset="0%" stop-color="rgba(216,183,111,0)"/>
      <stop offset="50%" stop-color="rgba(216,183,111,.44)"/>
      <stop offset="100%" stop-color="rgba(216,183,111,0)"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.85 0 1 0 0 0.67 0 0 1 0 0.28 0 0 0 .34 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .045"/>
      </feComponentTransfer>
    </filter>
    <g id="custom-zhao" fill="none" stroke="url(#strokeGold)" stroke-linecap="round" stroke-linejoin="round">
      <path d="M58 38H123V124H58Z" stroke-width="9"/>
      <path d="M69 67H112M69 96H112" stroke-width="5.8" opacity=".82"/>
      <path d="M153 39H216" stroke-width="9"/>
      <path d="M184 40C180 66 166 88 144 102" stroke-width="9"/>
      <path d="M153 82H221V126H153Z" stroke-width="9"/>
      <path d="M165 104H209" stroke-width="5.5" opacity=".72"/>
      <path d="M42 151H232" stroke-width="8.5" opacity=".9"/>
      <path d="M63 188C54 205 46 221 35 238" stroke-width="9"/>
      <path d="M111 183C103 204 99 222 94 244" stroke-width="9"/>
      <path d="M160 183C168 204 173 223 179 244" stroke-width="9"/>
      <path d="M212 188C225 207 235 223 245 238" stroke-width="9"/>
    </g>
  </defs>

  <rect width="1600" height="1000" fill="url(#bgGlow)"/>
  <rect width="1600" height="1000" filter="url(#grain)" opacity=".72"/>
  <circle cx="1188" cy="168" r="330" fill="rgba(216,183,111,.065)"/>
  <circle cx="260" cy="790" r="360" fill="rgba(95,132,117,.07)"/>
  <path d="M0 768C150 708 260 620 410 653C550 684 610 744 755 684C875 635 942 548 1088 594C1230 640 1305 718 1600 642V1000H0Z" fill="rgba(244,235,221,.035)"/>
  <path d="M0 858C184 802 300 775 468 804C635 833 744 764 914 788C1095 814 1214 870 1600 800V1000H0Z" fill="rgba(95,132,117,.07)"/>

  <line x1="96" y1="92" x2="1504" y2="92" stroke="url(#quietLine)" stroke-width="1"/>
  <text x="96" y="64" class="latin">YANGMING REFLECTION DISPLAY · V0.1</text>
  <text x="1504" y="64" class="small" text-anchor="end">东方 AI 心学品牌字标预览</text>

  <g transform="translate(118 158)">
    <rect x="0" y="0" width="480" height="520" rx="44" fill="rgba(8,8,7,.28)" stroke="rgba(217,189,122,.13)"/>
    <circle cx="240" cy="228" r="168" fill="rgba(216,183,111,.035)"/>
    <use href="#custom-zhao" transform="translate(106 82) scale(1.08)" filter="url(#softGlow)"/>
    <text x="240" y="420" text-anchor="middle" class="label">照</text>
    <text x="240" y="462" text-anchor="middle" class="small">原创矢量字标 / 先照见，不判断</text>
  </g>

  <g transform="translate(682 160)">
    <text x="0" y="34" class="label">首页主标题字阶</text>
    <text x="0" y="152" class="display" font-size="116">心不静，</text>
    <text x="0" y="286" class="display" font-size="116">交易必乱。</text>
    <text x="4" y="352" class="small">精修明宋骨架 / 微楷意收笔 / 不金融、不国风、不喧哗</text>
    <line x1="0" y1="406" x2="820" y2="406" stroke="url(#quietLine)" stroke-width="1"/>
    <text x="0" y="456" class="latin">QUIET · PRECISE · WARM · EASTERN · AI</text>
  </g>

  <g transform="translate(116 748)">
    <text x="0" y="-34" class="label">品牌四句题字母题</text>
    <g transform="translate(0 0)">
      <rect x="0" y="0" width="320" height="98" rx="49" fill="rgba(244,235,221,.026)" stroke="rgba(217,189,122,.11)"/>
      <text x="160" y="62" text-anchor="middle" class="mantra">以交易照人心</text>
    </g>
    <g transform="translate(358 0)">
      <rect x="0" y="0" width="320" height="98" rx="49" fill="rgba(244,235,221,.026)" stroke="rgba(217,189,122,.11)"/>
      <text x="160" y="62" text-anchor="middle" class="mantra">以复盘照行为</text>
    </g>
    <g transform="translate(716 0)">
      <rect x="0" y="0" width="320" height="98" rx="49" fill="rgba(244,235,221,.026)" stroke="rgba(217,189,122,.11)"/>
      <text x="160" y="62" text-anchor="middle" class="mantra">以训练照变化</text>
    </g>
    <g transform="translate(1074 0)">
      <rect x="0" y="0" width="320" height="98" rx="49" fill="rgba(244,235,221,.026)" stroke="rgba(217,189,122,.11)"/>
      <text x="160" y="62" text-anchor="middle" class="mantra">以活镜照成长</text>
    </g>
  </g>

  <g transform="translate(116 908)">
    <text class="small">合规边界：仅用于交易认知、行为训练与风险教育；不荐股、不喊单、不承诺收益。</text>
    <text x="1392" class="small" text-anchor="end">Yangming Display / preview specimen</text>
  </g>
</svg>
