    <text x="0" y="122" class="display">心不静<tspan class="punct" dx="-10" dy="-8">，</tspan></text>
    <text x="0" y="254" class="display">交易必乱<tspan class="punct" dx="-10" dy="-2">。</tspan></text>
    <text x="2" y="316" class="body">规则：明宋 88% / 楷意 7% / 品牌特征 5%。标点只做气息，不占气势。</text>
    <line x1="0" y1="366" x2="840" y2="366" stroke="url(#line)" stroke-width="1"/>
    <text x="0" y="420" class="latin">REFLECTIVE INTELLIGENCE · DISCIPLINE BEFORE DECISION</text>
