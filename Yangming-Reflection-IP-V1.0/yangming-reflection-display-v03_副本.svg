          <path d="M76 184C66 201 60 214 51 229M114 184C108 201 104 216 101 233M154 184C160 201 164 216 167 233M194 184C204 201 212 215 222 229" stroke="currentColor" stroke-width="6.8" stroke-linecap="round"/>
