<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>阳明照见字系 V1.0 Showcase 对外展示版</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #080807;
      --paper: #f3ead9;
      --line: rgba(217, 189, 122, .12);
    }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--paper);
      background: linear-gradient(180deg, #11100d, var(--ink));
      font-family: "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
    }
    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 46px 0 70px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
      color: rgba(244, 235, 221, .42);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
    }
    .preview {
      width: 100%;
      margin-top: 34px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(8, 8, 7, .26);
    }
    .preview img {
      display: block;
      width: 100%;
      height: auto;
    }
    p {
      margin-top: 30px;
      color: rgba(244, 235, 221, .48);
      font-size: 14px;
      line-height: 1.8;
      letter-spacing: .04em;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <span>Yangming Reflection System · V1.0 Showcase</span>
      <span>External brand view</span>
    </header>
    <section class="preview" aria-label="阳明照见字系 V1.0 Showcase 对外展示版">
      <img src="./yangming-reflection-system-v10-showcase.svg" alt="阳明照见字系 V1.0 Showcase 对外展示版" />
    </section>
    <p>对外展示版只保留最核心的品牌信息：照、心不静交易必乱、停十秒、心证产品流、四个母题与风险边界。</p>
  </main>
</body>
</html>
