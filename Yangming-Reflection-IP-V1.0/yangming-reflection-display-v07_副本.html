<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>阳明照骨字系 V0.7 Brand Asset Kit</title>
  <style>
    :root {
      color-scheme: dark;
      --ink: #080807;
      --paper: #f3ead9;
      --line: rgba(217, 189, 122, .12);
    }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--paper);
      background: linear-gradient(180deg, #11100d, var(--ink));
      font-family: "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
    }
    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 46px 0 70px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
      color: rgba(244, 235, 221, .42);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
    }
    .preview {
      width: 100%;
      margin-top: 34px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(8, 8, 7, .26);
    }
    .preview img {
      display: block;
      width: 100%;
      height: auto;
    }
    p {
      margin-top: 30px;
      color: rgba(244, 235, 221, .48);
      font-size: 14px;
      line-height: 1.8;
      letter-spacing: .04em;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <span>Yangming Reflection Display · V0.7</span>
      <span>Brand asset kit with thought core</span>
    </header>
    <section class="preview" aria-label="阳明照骨字系 V0.7 品牌资产建设首版">
      <img src="./yangming-reflection-display-v07.svg" alt="阳明照骨字系 V0.7 品牌资产建设首版" />
    </section>
    <p>这版把文字背后的思想结构放在最前面：一个字、 一句话、一个动作、一个系统、一条边界，再进入 Logo、字体、产品、符号、数字与合规规范。</p>
  </main>
</body>
</html>
