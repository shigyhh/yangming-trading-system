<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>阳明照骨字系 V0.4 象形骨架测试</title>
  <style>
    @font-face {
      font-family: YangmingDisplayPreview;
      src: url("../../web-next/public/fonts/NotoSerifSC-Variable.woff2") format("woff2");
      font-weight: 200 900;
    }

    :root {
      color-scheme: dark;
      --ink: #080807;
      --paper: #f3ead9;
      --gold: rgba(216, 183, 111, .64);
      --line: rgba(217, 189, 122, .12);
      --display: YangmingDisplayPreview, "Noto Serif SC", "Songti SC", serif;
      --body: "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--paper);
      background:
        radial-gradient(circle at 78% 8%, rgba(216, 183, 111, .045), transparent 28rem),
        radial-gradient(circle at 12% 84%, rgba(95, 132, 117, .05), transparent 30rem),
        linear-gradient(180deg, #11100d, var(--ink));
      font-family: var(--body);
    }

    main {
      width: min(1180px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 46px 0 70px;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
      color: rgba(244, 235, 221, .42);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
    }

    .preview {
      width: 100%;
      margin-top: 34px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(8, 8, 7, .26);
    }

    .preview img {
      display: block;
      width: 100%;
      height: auto;
    }

    .notes {
      margin-top: 34px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      border: 1px solid var(--line);
      background: var(--line);
    }

    .note {
      min-height: 148px;
      padding: 22px;
      background: rgba(8, 8, 7, .76);
    }

    .note strong {
      display: block;
      color: var(--gold);
      font-family: var(--display);
      font-size: 20px;
      font-weight: 440;
      letter-spacing: .1em;
    }

    .note p {
      margin: 14px 0 0;
      color: rgba(244, 235, 221, .52);
      font-size: 13px;
      line-height: 1.8;
    }

    .compliance {
      margin-top: 34px;
      color: rgba(244, 235, 221, .38);
      font-size: 12px;
      letter-spacing: .08em;
      text-align: center;
    }

    @media (max-width: 980px) {
      header,
      .notes {
        display: grid;
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <span>Yangming Bone-Ming Display · V0.4</span>
      <span>Pictographic Structure Test</span>
    </header>
    <section class="preview" aria-label="阳明照骨字系 V0.4 象形骨架测试">
      <img src="./yangming-reflection-display-v04.svg" alt="阳明照骨字系 V0.4 象形骨架测试样张" />
    </section>
    <section class="notes" aria-label="V0.4 改动说明">
      <div class="note">
        <strong>甲骨为骨</strong>
        <p>不直接做甲骨文风格，而是取目、日、火、行、回、水、木的结构逻辑。</p>
      </div>
      <div class="note">
        <strong>三线照字</strong>
        <p>明宋照用于正式标识，象形照用于品牌印记，小尺寸照用于 favicon 和头像。</p>
      </div>
      <div class="note">
        <strong>关键字入骨</strong>
        <p>主标题不整句古文字化，只让心、交、乱三个锚点带极轻象形骨势。</p>
      </div>
      <div class="note">
        <strong>符号系统</strong>
        <p>四句母题开始拥有可复制的东方认知符号，而不是通用 UI 图标。</p>
      </div>
    </section>
    <p class="compliance">本系统仅用于交易认知、行为训练与风险教育；不荐股、不喊单、不承诺收益。</p>
  </main>
</body>
</html>
