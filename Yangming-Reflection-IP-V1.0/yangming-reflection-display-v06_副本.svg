      .num {
        font-family: "Avenir Next", "Inter", "Helvetica Neue", Arial, sans-serif;
        font-size: 38px;
        font-weight: 660;
        letter-spacing: .025em;
        fill: #f3ead9;
      }
      .num-dark {
        font-family: "Avenir Next", "Inter", "Helvetica Neue", Arial, sans-serif;
        font-size: 34px;
        font-weight: 660;
        letter-spacing: .025em;
        fill: #11100d;
      }
      .num-label {
        font-family: "Avenir Next", "Inter", "Helvetica Neue", Arial, sans-serif;
        font-size: 11px;
        font-weight: 720;
        letter-spacing: .16em;
        fill: rgba(244, 235, 221, .44);
      }
      .num-label-dark {
        font-family: "Avenir Next", "Inter", "Helvetica Neue", Arial, sans-serif;
        font-size: 10px;
        font-weight: 720;
        letter-spacing: .14em;
        fill: rgba(17, 16, 13, .48);
      }
