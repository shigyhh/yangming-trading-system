<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">阳明照骨字系 V0.6 最后六分验证板</title>
  <desc id="desc">V0.6 验证 Logo 光学校正、小标真实尺寸、24px UI 图标、数字系统、白底系统和真实产品流。</desc>
  <defs>
    <style>
