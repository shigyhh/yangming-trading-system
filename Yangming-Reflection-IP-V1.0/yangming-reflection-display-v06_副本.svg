  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect width="1600" height="1200" filter="url(#grain)" opacity=".76"/>
  <circle cx="1284" cy="170" r="316" fill="rgba(216,183,111,.03)"/>
  <circle cx="210" cy="966" r="392" fill="rgba(95,132,117,.04)"/>
  <path d="M0 1008C220 928 430 930 624 964C832 1001 958 914 1164 940C1320 960 1436 1012 1600 962V1200H0Z" fill="rgba(95,132,117,.04)"/>

  <line x1="88" y1="84" x2="1512" y2="84" stroke="url(#line)" stroke-width="1"/>
  <text x="88" y="56" class="latin">YANGMING REFLECTION DISPLAY · V0.6</text>
  <text x="1512" y="56" text-anchor="end" class="body">最后 6 分：工艺验证，不加概念</text>

  <g transform="translate(88 122)">
    <text x="0" y="0" class="label">01 / A 主标光学校正</text>
    <rect x="0" y="30" width="450" height="306" rx="26" fill="rgba(8,8,7,.2)" stroke="rgba(217,189,122,.11)"/>
    <g transform="translate(36 74)" color="#e8decb">
      <use href="#zhao-a0" transform="scale(.56)"/>
      <text x="0" y="170" class="latin">A0 CURRENT</text>
    </g>
    <g transform="translate(236 74)" color="#f3ead9">
      <use href="#zhao-a1" transform="scale(.56)"/>
      <text x="0" y="170" class="latin">A1 OPTICAL</text>
    </g>
    <text x="34" y="270" class="body">A1 横线短 8%、四点轻 4%、整体更产品化。方向可作为主标最终候选。</text>
  </g>

  <g transform="translate(584 122)">
    <text x="0" y="0" class="label">02 / C 小标真实尺寸</text>
    <rect x="0" y="30" width="392" height="306" rx="26" fill="rgba(8,8,7,.2)" stroke="rgba(217,189,122,.11)"/>
    <g transform="translate(38 86)" color="#f3ead9">
      <rect x="0" y="0" width="96" height="96" rx="24" fill="rgba(244,235,221,.035)" stroke="rgba(217,189,122,.12)"/>
      <use href="#zhao-c" transform="translate(20 17) scale(.24)"/>
      <text x="0" y="134" class="latin">96</text>
    </g>
    <g transform="translate(166 104)" color="#f3ead9">
      <rect x="0" y="0" width="64" height="64" rx="16" fill="rgba(244,235,221,.035)" stroke="rgba(217,189,122,.12)"/>
      <use href="#zhao-c" transform="translate(14 12) scale(.16)"/>
      <text x="2" y="102" class="latin">64</text>
    </g>
    <g transform="translate(270 120)" color="#f3ead9">
      <rect x="0" y="0" width="32" height="32" rx="8" fill="rgba(244,235,221,.04)" stroke="rgba(217,189,122,.1)"/>
      <use href="#zhao-c" transform="translate(7 6) scale(.08)"/>
      <text x="-2" y="68" class="latin">32</text>
    </g>
    <text x="34" y="270" class="body">24px 以下仍需再简化，不能硬缩完整 C。</text>
  </g>

  <g transform="translate(1022 122)">
    <text x="0" y="0" class="label">03 / 24px UI Glyph</text>
    <rect x="0" y="30" width="490" height="306" rx="26" fill="rgba(8,8,7,.2)" stroke="rgba(217,189,122,.11)"/>
    <g transform="translate(40 84)" color="#f3ead9">
      <use href="#glyph-trade" transform="scale(.42)" stroke-width="8"/>
      <use href="#glyph-review" transform="translate(102 0) scale(.42)" stroke-width="8"/>
      <use href="#glyph-train" transform="translate(204 0) scale(.42)" stroke-width="8"/>
      <use href="#glyph-growth" transform="translate(306 0) scale(.42)" stroke-width="8"/>
    </g>
    <g transform="translate(50 182)" color="#f3ead9">
      <use href="#glyph-trade" transform="scale(.13)" stroke-width="12"/>
      <use href="#glyph-review" transform="translate(94 0) scale(.13)" stroke-width="12"/>
      <use href="#glyph-train" transform="translate(188 0) scale(.13)" stroke-width="12"/>
      <use href="#glyph-growth" transform="translate(282 0) scale(.13)" stroke-width="12"/>
      <text x="0" y="58" class="latin">24PX PASS</text>
    </g>
    <text x="34" y="270" class="body">UI 版只保留核心结构：交心 / 回证 / 重复 / 镜生。</text>
  </g>

  <g transform="translate(88 492)">
    <text x="0" y="0" class="label">04 / 白底系统页</text>
    <rect x="0" y="30" width="450" height="406" rx="28" fill="#f3ead9"/>
    <g transform="translate(34 72)" color="#11100d">
      <use href="#zhao-a1" transform="scale(.32)"/>
      <text x="118" y="32" class="latin-dark">YANGMING REFLECTION</text>
      <text x="112" y="70" class="display-dark">心不静，交易必乱。</text>
      <text x="118" y="112" class="body-dark">白底不靠黑金氛围。先清楚，再东方。</text>
      <line x1="0" y1="152" x2="382" y2="152" stroke="rgba(17,16,13,.14)"/>
      <text x="0" y="204" class="label-dark">以复盘照行为</text>
      <text x="0" y="242" class="body-dark">把念头落回证据，把行为放回训练。</text>
      <text x="0" y="310" class="num-label-dark">DISCIPLINE</text>
      <text x="0" y="358" class="num-dark">88%</text>
      <text x="142" y="310" class="num-label-dark">CYCLE</text>
      <text x="142" y="358" class="num-dark">1/7</text>
    </g>
  </g>

  <g transform="translate(584 492)">
    <text x="0" y="0" class="label">05 / 真实产品流缩略</text>
    <rect x="0" y="30" width="928" height="406" rx="28" fill="rgba(8,8,7,.18)" stroke="rgba(217,189,122,.1)"/>
    <g transform="translate(34 76)">
      <text x="0" y="0" class="latin">HOME HERO</text>
      <text x="0" y="60" class="display">心不静，</text>
      <text x="0" y="124" class="display">交易必乱。</text>
      <text x="0" y="168" class="body">进入交易人格测评 / 查看训练体系</text>
    </g>
    <g transform="translate(350 76)">
      <text x="0" y="0" class="latin">TRAINING TASK</text>
      <rect x="0" y="26" width="236" height="176" rx="22" fill="rgba(244,235,221,.035)" stroke="rgba(217,189,122,.12)"/>
      <text x="24" y="74" class="law">今日只练一件事</text>
      <text x="24" y="114" class="body">看到拉升，先停十秒。</text>
      <text x="24" y="158" class="num">10s</text>
    </g>
    <g transform="translate(636 76)">
      <text x="0" y="0" class="latin">REVIEW REPORT</text>
      <rect x="0" y="26" width="236" height="176" rx="22" fill="rgba(244,235,221,.035)" stroke="rgba(217,189,122,.12)"/>
      <text x="24" y="74" class="law">复盘照行为</text>
      <text x="24" y="114" class="body">这次先动的是怕错过。</text>
      <text x="24" y="158" class="num">07</text>
    </g>
    <line x1="34" y1="292" x2="894" y2="292" stroke="rgba(217,189,122,.1)"/>
    <text x="34" y="346" class="latin">HERO · TRAINING · REVIEW · DISCIPLINE · RISK NOTICE</text>
  </g>

  <g transform="translate(88 1032)">
    <text class="body">合规边界：仅用于交易认知、行为训练与风险教育；不荐股、不喊单、不承诺收益。</text>
    <text x="1424" text-anchor="end" class="latin">95 REQUIRES PRODUCT FLOW</text>
  </g>
</svg>
