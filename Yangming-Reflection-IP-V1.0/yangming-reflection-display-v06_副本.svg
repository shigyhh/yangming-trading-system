    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#11100d"/>
      <stop offset="56%" stop-color="#080807"/>
      <stop offset="100%" stop-color="#050504"/>
    </linearGradient>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0%" stop-color="rgba(216,183,111,0)"/>
      <stop offset="50%" stop-color="rgba(216,183,111,.32)"/>
      <stop offset="100%" stop-color="rgba(216,183,111,0)"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency=".74" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 .024"/>
      </feComponentTransfer>
    </filter>

    <g id="zhao-a0" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M55 40H119V123H55Z" stroke-width="9.2"/>
      <path d="M68 68H107M68 96H107" stroke-width="5.2" opacity=".72"/>
      <path d="M154 42H214" stroke-width="9.2"/>
      <path d="M184 44C180 68 167 88 146 104" stroke-width="9.2"/>
      <path d="M154 84H217V123H154Z" stroke-width="9.2"/>
      <path d="M166 104H206" stroke-width="5" opacity=".7"/>
      <path d="M60 151H219" stroke-width="7.2"/>
      <path d="M68 185C58 202 52 216 43 231M112 184C106 201 102 217 98 234M156 184C162 201 166 217 170 234M202 185C212 202 222 216 231 231" stroke-width="7.1"/>
    </g>
    <g id="zhao-a1" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M55 40H119V123H55Z" stroke-width="9"/>
      <path d="M68 68H107M68 96H107" stroke-width="5" opacity=".72"/>
      <path d="M154 42H214" stroke-width="9"/>
      <path d="M184 44C180 68 167 88 146 104" stroke-width="9"/>
      <path d="M154 84H217V123H154Z" stroke-width="9"/>
      <path d="M166 104H206" stroke-width="4.8" opacity=".7"/>
      <path d="M66 151H213" stroke-width="6.7"/>
      <path d="M70 184C61 200 55 213 47 228M113 183C107 199 104 214 101 231M155 183C160 199 163 214 166 231M199 184C209 200 217 214 225 228" stroke-width="6.8"/>
    </g>
    <g id="zhao-c" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M58 60H118V120H58Z" stroke-width="11"/>
      <path d="M74 90H104" stroke-width="6.8"/>
      <path d="M146 63H215V118H146Z" stroke-width="11"/>
      <path d="M160 91H202" stroke-width="6.8"/>
      <path d="M62 148H214" stroke-width="9"/>
      <path d="M82 184L65 220M128 178L122 220M172 178L180 220M214 184L236 220" stroke-width="8.8"/>
    </g>
    <g id="glyph-trade" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M30 88H150M90 42V134"/>
      <circle cx="90" cy="88" r="18"/>
    </g>
    <g id="glyph-review" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M54 54H132V132H54Z"/>
      <path d="M50 150C86 134 112 152 148 132"/>
    </g>
    <g id="glyph-train" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M50 64H132M58 92H140M66 120H148"/>
      <path d="M144 120L154 110"/>
    </g>
    <g id="glyph-growth" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M42 92C66 66 116 66 140 92C116 116 66 116 42 92Z"/>
      <path d="M90 136V74M90 96C72 88 68 74 70 58M90 96C112 86 118 72 116 54"/>
    </g>
