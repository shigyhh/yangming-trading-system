        font-family: "YangmingSansPreview", "Noto Sans SC", "PingFang SC", sans-serif;
        font-size: 13px;
        font-weight: 520;
        letter-spacing: .04em;
        fill: rgba(244, 235, 221, .52);
      }
      .body-dark {
        font-family: "YangmingSansPreview", "Noto Sans SC", "PingFang SC", sans-serif;
        font-size: 12px;
        font-weight: 530;
        letter-spacing: .035em;
        fill: rgba(17, 16, 13, .58);
      }
      .display {
        font-family: "YangmingDisplayPreview", "Noto Serif SC", "Songti SC", serif;
        font-size: 48px;
        font-weight: 445;
